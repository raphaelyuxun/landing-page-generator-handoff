# 单容器自洽：app 镜像内置 Xray（图片走内置代理翻墙到 Google/Nano Banana，AIGW/文本直连）。
# 所有配置来自同一个 .env。
#   docker compose up -d --build
services:
  app:
    build: .
    restart: unless-stopped
    env_file: [.env]          # 密钥/节点全在 .env（含 XRAY_* 与 NANO_BANANA_* / AIGW_*）
    ports:
      - "4100:4100"
    volumes:
      - es-data:/app/data      # 任务/素材持久化（迁移数据灌到这个卷）
      # UI 改的旋钮要持久化就取消下一行注释：
      # - ./config:/app/config
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  es-data: {}
