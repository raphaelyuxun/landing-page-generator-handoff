<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EaseSourcing 模板文档 · README</title>
<link rel="icon" type="image/png" href="/templates/favicon.png" />
<style>
  :root{--brand:#2dd4a0;--brand-active:#1aa97c;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#ffffff;--soft:#f8fafc;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--soft);line-height:1.7;-webkit-font-smoothing:antialiased}
  header.bar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  header.bar .in{max-width:920px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .brandmark{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .brandmark span{color:var(--brand-active)}
  .back{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:#334155;font-size:14px;font-weight:600;
    border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px}
  .back:hover{border-color:var(--brand);color:var(--brand-active)}
  .back svg{width:15px;height:15px}
  main{max-width:920px;margin:28px auto 80px;padding:0 24px}
  .doc{background:#fff;border:1px solid var(--line);border-radius:16px;padding:40px 48px;box-shadow:0 18px 50px -34px rgba(15,23,42,.4)}
  .doc>:first-child{margin-top:0}
  .doc h1{font-size:30px;font-weight:800;letter-spacing:-.01em;margin:0 0 8px;padding-bottom:14px;border-bottom:2px solid var(--line)}
  .doc h2{font-size:22px;font-weight:800;margin:42px 0 14px;padding-top:8px}
  .doc h3{font-size:17px;font-weight:700;margin:28px 0 10px}
  .doc p{margin:14px 0}
  .doc a{color:var(--brand-active);text-decoration:none;border-bottom:1px solid #bbf3df}
  .doc a:hover{border-bottom-color:var(--brand-active)}
  .doc code{font-family:var(--mono);font-size:.88em;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:5px;padding:1px 6px}
  .doc pre{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:18px 20px;overflow:auto;margin:18px 0;font-size:13px;line-height:1.6}
  .doc pre code{background:none;border:0;padding:0;color:inherit;font-size:inherit}
  .doc ul,.doc ol{padding-left:22px;margin:14px 0}
  .doc li{margin:6px 0}
  .doc blockquote{margin:18px 0;padding:12px 18px;border-left:4px solid var(--brand);background:var(--soft);border-radius:0 10px 10px 0;color:#475569}
  .doc blockquote p{margin:6px 0}
  .doc hr{border:0;border-top:1px solid var(--line);margin:34px 0}
  .doc table{border-collapse:collapse;width:100%;margin:18px 0;font-size:14px;display:block;overflow-x:auto}
  .doc th,.doc td{border:1px solid var(--line);padding:9px 13px;text-align:left;vertical-align:top}
  .doc th{background:var(--soft);font-weight:700}
  .doc tr:nth-child(even) td{background:#fcfdfe}
  .doc strong{font-weight:700}
  .loading,.error{padding:60px 20px;text-align:center;color:var(--muted)}
  .error{color:#b91c1c}
  @media(max-width:560px){ .doc{padding:26px 22px} .doc h1{font-size:24px} }
</style>
</head>
<body>
<header class="bar"><div class="in">
  <div class="brandmark">Ease<span>Sourcing</span> · 模板文档</div>
  <a class="back" href="/templates/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>返回模板列表</a>
</div></header>
<main>
  <article class="doc" id="doc"><div class="loading">Loading README…</div></article>
</main>

<script src="marked.min.js"></script>
<script>
  (function(){
    var box = document.getElementById("doc");
    function render(md){
      try {
        if (window.marked) {
          marked.setOptions({ gfm:true, breaks:false });
          box.innerHTML = marked.parse(md);
        } else {
          // graceful fallback: show raw markdown in a <pre>
          var pre = document.createElement("pre");
          pre.textContent = md;
          box.innerHTML = ""; box.appendChild(pre);
        }
        document.title = "EaseSourcing 模板文档 · README";
      } catch (e) {
        box.innerHTML = '<div class="error">渲染失败：' + (e && e.message) + '</div>';
      }
    }
    fetch("README.md", {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("README.md " + r.status); return r.text(); })
      .then(render)
      .catch(function(err){ box.innerHTML = '<div class="error">无法加载 README.md：' + LP_safe(err) + '</div>'; });
    function LP_safe(e){ return (e && e.message ? e.message : String(e)).replace(/[<>&]/g,""); }
  })();
</script>
<script src="/templates/_switcher.js?v=6"></script></body>
</html>
